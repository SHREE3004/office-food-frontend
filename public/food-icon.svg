<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#ff6b35"/>

  <!-- Fork (left) - white, bold, tilted -->
  <g transform="translate(130, 60) rotate(-10, 60, 200)">
    <!-- Tines -->
    <rect x="30" y="0" width="14" height="100" rx="7" fill="#fff"/>
    <rect x="53" y="0" width="14" height="100" rx="7" fill="#fff"/>
    <rect x="76" y="0" width="14" height="100" rx="7" fill="#fff"/>
    <!-- Bridge -->
    <rect x="30" y="90" width="60" height="20" rx="6" fill="#fff"/>
    <!-- Handle -->
    <rect x="48" y="105" width="24" height="260" rx="12" fill="#fff"/>
  </g>

  <!-- Knife (right) - white, bold, tilted -->
  <g transform="translate(280, 60) rotate(10, 60, 200)">
    <!-- Blade -->
    <path d="M50,0 C80,0 90,40 90,100 L90,110 L50,110 Z" fill="#fff"/>
    <!-- Handle -->
    <rect x="50" y="105" width="24" height="260" rx="12" fill="#fff"/>
  </g>
</svg>
